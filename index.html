<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Venta de Llaveros</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#ff9966,#ff5e62);
    min-height:100vh;
}

header{
    text-align:center;
    color:white;
    padding:30px;
}

header h1{
    font-size:3em;
}

header p{
    font-size:1.2em;
}

.catalogo{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:25px;
    padding:30px;
}

.tarjeta{
    background:white;
    width:300px;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 20px rgba(0,0,0,.2);
    transition:.3s;
}

.tarjeta:hover{
    transform:scale(1.05);
}

.tarjeta img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.info{
    padding:20px;
    text-align:center;
}

.precio{
    color:#ff5e62;
    font-size:2em;
    font-weight:bold;
    margin:10px 0;
}

button{
    background:#ff5e62;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#ff3c4f;
}

.formulario{
    background:white;
    width:90%;
    max-width:500px;
    margin:30px auto;
    padding:25px;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
}

.formulario h2{
    text-align:center;
    margin-bottom:20px;
}

input,select{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:10px;
}

footer{
    text-align:center;
    color:white;
    padding:20px;
}
</style>
</head>
<body>

<header>
    <h1>🔑 Venta de Llaveros 🔑</h1>
    <p>¡Personaliza tu estilo con nuestros increíbles llaveros!</p>
</header>

<section class="catalogo">
<div class="tarjeta">
   <img src="llavero 1.jpg" alt="Llavero metálico">
    <div class="info">
        <h2>Llavero Premium</h2>
        <p>Diseño exclusivo y resistente.</p>
        <div class="precio">$20 MXN</div>
        <button onclick="seleccionar('Llavero Premium - $20')">Comprar</button>
    </div>
</div>

<div class="tarjeta">
  <img src="llavero2.jpg" alt="Llavero">
    <div class="info">
        <h2>Llavero Clásico</h2>
        <p>Simple, bonito y económico.</p>
        <div class="precio">$15 MXN</div>
        <button onclick="seleccionar('Llavero Clásico - $15')">Comprar</button>
    </div>
</div>
    
</section>

<div class="formulario">
    <h2>🛒 Realiza tu pedido</h2>

    <input type="text" placeholder="Nombre completo">

    <input type="text" placeholder="Grupo o salón">

    <select id="producto">
        <option>Selecciona un llavero</option>
        <option>Llavero Premium - $20</option>
        <option>Llavero Clásico - $15</option>
    </select>

    <input type="number" placeholder="Cantidad">

    <button style="width:100%;">Enviar Pedido</button>
</div>

<footer>
    <h3>✨ Gracias por apoyar nuestro proyecto ✨</h3>
</footer>

<script>
function seleccionar(producto){
    document.getElementById("producto").value = producto;
    window.scrollTo({
        top: document.querySelector(".formulario").offsetTop,
        behavior:"smooth"
    });
}
</script>

</body>
</html>
